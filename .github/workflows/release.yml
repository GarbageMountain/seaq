name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.0.0, 2.1.0-beta.1)'
        required: true
        type: string
      dry-run:
        description: 'Dry run (skip npm publish and GitHub release)'
        required: false
        type: boolean
        default: false

jobs:
  release:
    name: Publish to npm & create GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup toolchain with Proto
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Get yarn cache directory
        id: yarn-config
        run: echo "CACHE_FOLDER=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT
        env:
          YARN_ENABLE_GLOBAL_CACHE: 'false'

      - name: Restore yarn cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-config.outputs.CACHE_FOLDER }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-modules-

      - name: Install dependencies
        run: yarn install --immutable
        env:
          YARN_ENABLE_GLOBAL_CACHE: 'false'

      - name: Type check
        run: yarn ts-check

      - name: Lint
        run: yarn check

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build

      - name: Set version in package.json
        working-directory: packages/core
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - name: Publish to npm
        if: ${{ !inputs.dry-run }}
        working-directory: packages/core
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: ${{ !inputs.dry-run }}
        run: gh release create "v${{ inputs.version }}" --generate-notes --target "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
