name: Deploy docs

on:
  push:
    branches: [master]
    paths:
      - 'packages/docs/**'
      - 'packages/core/**'
      - 'packages/test-data/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let in-progress deploys finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup toolchain with Proto
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Get yarn cache directory
        id: yarn-config
        run: echo "CACHE_FOLDER=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT
        env:
          YARN_ENABLE_GLOBAL_CACHE: 'false'

      - name: Restore yarn cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-config.outputs.CACHE_FOLDER }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-modules-

      - name: Install dependencies
        run: yarn install --immutable
        env:
          YARN_ENABLE_GLOBAL_CACHE: 'false'

      - name: Build core
        run: yarn workspace seaq build

      - name: Build docs site
        run: yarn workspace @seaq/docs build
        env:
          DOCS_BASE: /seaq/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/docs/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
